# ============================================================
# HAProxy Configuration — NanoPi R5C
# Astral App — Servicio de hosting de juegos en línea
# ============================================================
# NOTA: Las IPs internas de red local han sido mantenidas
# ya que no son datos sensibles. Adaptar según tu red.
# ============================================================

#FRONTENDS
frontend claro
        bind 192.168.1.40:80
        mode http
        redirect scheme https

frontend cifrado
        bind 192.168.1.40:443 ssl crt /etc/cert/
        mode http
        acl host_xxx hdr(host) -i xxx
        use_backend backend-xxx if host_xxx
        acl host_xxx hdr(host) -i xxx
        use_backend backend-xxx if host_xxx
        acl host_xxx hdr(host) -i xxx
        use_backend backend-xxx if host_xxx
        acl host_xxx hdr(host) -i xxx
        use_backend backend-xxx if host_xxx
        acl host_xxx hdr(host) -i xxx
        use_backend backend-xxx if host_xxx
        acl url_discovery path /.well-known/caldav /.well-known/carddav
        http-request redirect location /remote.php/dav/ code 301 if url_discovery

frontend xxx
        bind 192.168.1.40:25000-25027
        mode tcp
        option tcplog
        default_backend backend-games

#BACKENDS
backend backend-xxx
        server xxx 192.168.1.95:xxx
        mode http
        option forwardfor

backend backend-xxx
        server xxx 192.168.1.30:xxx
        mode http
        option forwardfor

backend backend-xxx
        server xxx 192.168.1.30:xxx
        mode http
        option forwardfor

backend backend-xxx
        server xxx 192.168.1.30:xxx
        mode http
        option forwardfor

backend backend-xxx
        server xxx 192.168.1.60:xxx
        mode http
        option forwardfor
        http-request set-header X-Forwarded-Proto https if { ssl_fc }

backend backend-xxx
        server xxx 192.168.1.60
        mode tcp
