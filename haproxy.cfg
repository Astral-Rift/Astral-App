# ============================================================
# HAProxy Configuration — NanoPi R5C
# Astral App — Servicio de hosting de juegos en línea
# ============================================================
# NOTA: Las IPs internas de red local han sido mantenidas
# ya que no son datos sensibles. Adaptar según tu red.
# ============================================================

#FRONTENDS
frontend claro
        bind 192.168.1.40:80
        mode http
        redirect scheme https

frontend cifrado
        bind 192.168.1.40:443 ssl crt /etc/cert/
        mode http
        acl host_panel hdr(host) -i panel.astral-rift.com
        use_backend backend-panel if host_panel
        acl host_cloud hdr(host) -i cloud.astral-rift.com
        use_backend backend-cloud if host_cloud
        acl host_astral hdr(host) -i astral-rift.com
        use_backend backend-astral if host_astral
        acl host_wiki hdr(host) -i wiki.astral-rift.com
        use_backend backend-wiki if host_wiki
        acl host_tfg hdr(host) -i tfg.astral-rift.com
        use_backend backend-tfg if host_tfg
        acl url_discovery path /.well-known/caldav /.well-known/carddav
        http-request redirect location /remote.php/dav/ code 301 if url_discovery

frontend ft_games
        bind 192.168.1.40:25000-25027
        mode tcp
        option tcplog
        default_backend backend-games

#BACKENDS
backend backend-panel
        server backendpanel 192.168.1.95:80
        mode http
        option forwardfor

backend backend-cloud
        server backendcloud 192.168.1.30:80
        mode http
        option forwardfor

backend backend-astral
        server backendastral 192.168.1.30:2403
        mode http
        option forwardfor

backend backend-wiki
        server backendwiki 192.168.1.30:2405
        mode http
        option forwardfor

backend backend-tfg
        server backendtfg 192.168.1.60:80
        mode http
        option forwardfor
        http-request set-header X-Forwarded-Proto https if { ssl_fc }

backend backend-games
        server astralapp-games 192.168.1.60
        mode tcp
