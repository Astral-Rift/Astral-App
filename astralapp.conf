<VirtualHost *:80>
    ServerName tfg.astral-rift.com
    ProxyPreserveHost On

    # Redirigir peticiones de la API al backend Fastify (puerto 3000)
    ProxyPass /api http://127.0.0.1:3000/api
    ProxyPassReverse /api http://127.0.0.1:3000/api

    # Redirigir el resto al frontend Next.js (puerto 4000)
    ProxyPass / http://127.0.0.1:4000/
    ProxyPassReverse / http://127.0.0.1:4000/

    # Soporte para WebSockets
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteRule /(.*) ws://127.0.0.1:4000/$1 [P,L]

    ErrorLog ${APACHE_LOG_DIR}/astralapp_error.log
    CustomLog ${APACHE_LOG_DIR}/astralapp_access.log combined
</VirtualHost>
